<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Zaberman MVP</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 font-sans">

<div class="min-h-screen flex">

  <!-- Sidebar -->
  <aside class="w-64 bg-white border-r border-gray-200 p-5">
    <div class="mb-8">
      <h1 class="text-2xl font-bold">Zaberman IS</h1>
      <p class="text-gray-500 text-sm">Operational Hub</p>
    </div>

    <div class="space-y-3">
      <button class="w-full text-left bg-black text-white px-4 py-3 rounded-xl">
        Dashboard
      </button>

      <button class="w-full text-left bg-gray-50 px-4 py-3 rounded-xl border">
        Orders
      </button>

      <button class="w-full text-left bg-gray-50 px-4 py-3 rounded-xl border">
        Reports
      </button>

      <button class="w-full text-left bg-gray-50 px-4 py-3 rounded-xl border">
        Analytics
      </button>

      <button class="w-full text-left bg-gray-50 px-4 py-3 rounded-xl border">
        Directory
      </button>

      <button class="w-full text-left bg-gray-50 px-4 py-3 rounded-xl border">
        Integrations
      </button>

      <button class="w-full text-left bg-gray-50 px-4 py-3 rounded-xl border">
        Admin
      </button>
    </div>
  </aside>

  <!-- Main -->
  <main class="flex-1">

    <!-- Topbar -->
    <header class="bg-white border-b border-gray-200 px-6 py-4 flex justify-between items-center">

      <input
        type="text"
        placeholder="Search orders, customers, contacts..."
        class="border border-gray-300 rounded-xl px-4 py-3 w-full max-w-2xl"
      />

      <div class="ml-6 bg-gray-100 px-4 py-2 rounded-xl text-sm">
        BA Role
      </div>

    </header>

    <!-- Content -->
    <div class="p-6 space-y-6">

      <!-- Quick Actions -->
      <section class="bg-white rounded-3xl border border-gray-200 p-6">

        <h2 class="text-xl font-semibold mb-5">
          Quick Actions
        </h2>

        <div class="grid grid-cols-3 gap-4">

          <div class="bg-gray-50 border rounded-2xl p-5">
            Export Active Orders
          </div>

          <div class="bg-gray-50 border rounded-2xl p-5">
            Open Kommo
          </div>

          <div class="bg-gray-50 border rounded-2xl p-5">
            Open Spoke
          </div>

          <div class="bg-gray-50 border rounded-2xl p-5">
            Generate Report
          </div>

          <div class="bg-gray-50 border rounded-2xl p-5">
            Upload XLS
          </div>

          <div class="bg-gray-50 border rounded-2xl p-5">
            Search Order
          </div>

        </div>

      </section>

      <!-- KPI -->
      <section class="grid grid-cols-6 gap-4">

        <div class="bg-white rounded-2xl border p-5">
          <div class="text-sm text-gray-500">Active Orders</div>
          <div class="text-3xl font-bold mt-3">245</div>
        </div>

        <div class="bg-white rounded-2xl border p-5">
          <div class="text-sm text-gray-500">Delivered Today</div>
          <div class="text-3xl font-bold mt-3">18</div>
        </div>

        <div class="bg-white rounded-2xl border p-5">
          <div class="text-sm text-gray-500">Revenue</div>
          <div class="text-3xl font-bold mt-3">$42k</div>
        </div>

        <div class="bg-white rounded-2xl border p-5">
          <div class="text-sm text-gray-500">Delayed Orders</div>
          <div class="text-3xl font-bold mt-3">7</div>
        </div>

        <div class="bg-white rounded-2xl border p-5">
          <div class="text-sm text-gray-500">Pending Tasks</div>
          <div class="text-3xl font-bold mt-3">31</div>
        </div>

        <div class="bg-white rounded-2xl border p-5">
          <div class="text-sm text-gray-500">Exports</div>
          <div class="text-3xl font-bold mt-3">12</div>
        </div>

      </section>

      <!-- Charts -->
      <section class="grid grid-cols-2 gap-6">

        <div class="bg-white rounded-3xl border p-6 h-80">
          <h2 class="text-lg font-semibold mb-5">
            Orders by Status
          </h2>

          <div class="h-full border-2 border-dashed rounded-2xl flex items-center justify-center text-gray-400">
            Pie Chart Area
          </div>
        </div>

        <div class="bg-white rounded-3xl border p-6 h-80">
          <h2 class="text-lg font-semibold mb-5">
            Revenue Trend
          </h2>

          <div class="h-full border-2 border-dashed rounded-2xl flex items-center justify-center text-gray-400">
            Line Chart Area
          </div>
        </div>

      </section>

    </div>

  </main>

</div>

</body>
</html>
